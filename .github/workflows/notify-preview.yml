name: Notify Slack on Preview Deploy

on:
  page_build:

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.build.status == 'built'
    steps:
      - name: Extract PR number and commit message
        id: extract
        run: |
          COMMIT_SHA="${{ github.event.build.commit }}"
          # Fetch the first line of the commit message
          MSG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/commits/${COMMIT_SHA}" \
            | jq -r '.message' | head -1)
          # Extract PR number and commit message from "Deploy preview for PR #123: message"
          PR_NUM=$(echo "$MSG" | grep -oP '(?<=^Deploy preview for PR #)\d+' || true)
          COMMIT_MSG=$(echo "$MSG" | sed -n 's/.*PR #[0-9]*: //p')
          echo "pr_number=${PR_NUM:-}" >> "$GITHUB_OUTPUT"
          echo "commit_msg=${COMMIT_MSG:-}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.extract.outputs.pr_number != ''
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_USER_OAUTH_TOKEN }}
          payload: |
            channel: "C09KJ7UJ5HQ"
            text: "プレビューデプロイ完了（PR #${{ steps.extract.outputs.pr_number }}）確認してほしいポイントは「${{ steps.extract.outputs.commit_msg }}」です！ 確認は<https://stellar-careers.github.io/homepage-preview/${{ steps.extract.outputs.pr_number }}/|こちら> ;)"
            unfurl_links: false
            unfurl_media: false
